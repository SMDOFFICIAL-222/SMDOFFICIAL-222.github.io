  <script>
    /* 處理下拉選單 */
    function toggleDropdown(event, element) {
      event.stopPropagation();
      document.querySelectorAll('.dropdown-content').forEach(d => {
        if (d !== element.querySelector('.dropdown-content')) d.classList.remove('show');
      });
      element.querySelector('.dropdown-content').classList.toggle('show');
    }
    window.onclick = function(event) {
      if (!event.target.matches('.dropdown-btn')) {
        document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
      }
    }

    /* 處理表單送出不跳轉 */
    var submitted = false;
    function showSuccess() {
      // 隱藏表單，顯示成功訊息
      document.getElementById('beta-form').style.display = 'none';
      document.getElementById('success-msg').style.display = 'block';
    }
  </script>

  <script>
    (function(){
      const canvas = document.getElementById('cursor-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let width, height;
      const DPR = window.devicePixelRatio || 1;
      function resize(){ width = window.innerWidth; height = window.innerHeight; canvas.width = width * DPR; canvas.height = height * DPR; ctx.scale(DPR, DPR); }
      window.addEventListener('resize', resize); resize();
      const palette = ['#A2D9FF', '#FF9AA2', '#FFD966', '#F4D1FF', '#B8FFB0'];
      const particles = [];
      function drawStar(ctx, x, y, radius, rot) {
        ctx.save(); ctx.translate(x, y); ctx.rotate(rot); ctx.beginPath();
        const spikes = 5; const outerRadius = radius; const innerRadius = radius * 0.5;
        let angle = Math.PI / 2 * 3; let step = Math.PI / spikes;
        ctx.moveTo(0, -outerRadius);
        for (let i = 0; i < spikes; i++) { ctx.lineTo(Math.cos(angle) * outerRadius, Math.sin(angle) * outerRadius); angle += step; ctx.lineTo(Math.cos(angle) * innerRadius, Math.sin(angle) * innerRadius); angle += step; }
        ctx.lineTo(0, -outerRadius); ctx.closePath(); ctx.fill(); ctx.restore();
      }
      function addParticle(x, y) {
        particles.push({ x: x, y: y, vx: Math.cos(Math.random() * Math.PI * 2) * (Math.random() * 1.5), vy: Math.sin(Math.random() * Math.PI * 2) * (Math.random() * 1.5) - 0.5, size: Math.random() * 8 + 6, color: palette[Math.floor(Math.random() * palette.length)], alpha: 0.8, life: 0, maxLife: Math.random() * 40 + 40, rot: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 0.1 });
      }
      window.addEventListener('mousemove', (e) => { for(let i=0; i<2; i++) addParticle(e.clientX + (Math.random()-0.5)*10, e.clientY + (Math.random()-0.5)*10); }, {passive: true});
      function animate() {
        ctx.clearRect(0, 0, width, height);
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i]; p.life++;
          if (p.life >= p.maxLife) { particles.splice(i, 1); continue; }
          p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.rot += p.rotSpeed; p.alpha = 0.8 * (1 - p.life / p.maxLife);
          ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha; ctx.shadowBlur = 10; ctx.shadowColor = p.color;
          drawStar(ctx, p.x, p.y, p.size, p.rot);
        }
        ctx.shadowBlur = 0; ctx.globalAlpha = 1; requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
